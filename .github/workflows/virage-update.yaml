name: Run Virage Pipeline

on:
  push:
    branches: [master]

jobs:
  virage-update:
    name: Virage Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install Virage packages from npm
        run: |
          npm install --prefix ./virage-runner \
            @vivantel/virage-core@latest \
            @vivantel/virage-embedder-fastembed@latest \
            @vivantel/virage-store-postgres@latest

      - name: Restore Virage cache
        uses: actions/cache@v4
        with:
          path: docs/rag/
          key: virage-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            virage-${{ github.ref_name }}-
            virage-

      - name: Restore embedding progress
        uses: actions/cache/restore@v4
        with:
          path: docs/rag/embeddings.json
          key: virage-embeddings-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            virage-embeddings-${{ github.ref_name }}-

      - name: Run Virage pipeline
        run: ./virage-runner/node_modules/.bin/virage --config virage.config.ci.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Save Virage cache
        uses: actions/cache/save@v4
        with:
          path: docs/rag/
          key: virage-${{ github.ref_name }}-${{ github.sha }}

      - name: Save embedding progress
        if: always()
        uses: actions/cache/save@v4
        with:
          path: docs/rag/embeddings.json
          key: virage-embeddings-${{ github.ref_name }}-${{ github.sha }}
