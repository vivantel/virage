name: Run Virage Pipeline

on:
  push:
    branches: [master]

jobs:
  virage-update:
    name: Virage Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Build Virage packages from source
        run: |
          mkdir -p /tmp/virage-packs
          npm ci --ignore-scripts
          npm run build -w packages/virage-core
          npm run build -w packages/virage-cli
          npm pack --workspace packages/virage-core --pack-destination /tmp/virage-packs
          npm pack --workspace packages/virage-cli --pack-destination /tmp/virage-packs

      - name: Install Virage packages
        run: |
          CORE_TGZ=$(ls /tmp/virage-packs/vivantel-virage-core-*.tgz)
          CLI_TGZ=$(ls /tmp/virage-packs/vivantel-virage-cli-*.tgz)
          npm install --prefix ./virage-runner \
            "$CORE_TGZ" \
            "$CLI_TGZ" \
            @vivantel/virage-embedder-transformers@latest \
            @vivantel/virage-store-lancedb@latest \
            @vivantel/virage-chunker-ce-md@latest

      - name: Restore Virage cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .virage/lancedb
            .virage/virage.db
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            virage-${{ github.ref_name }}-
            virage-

      - name: Run Virage pipeline
        run: ./virage-runner/node_modules/.bin/virage index --config virage.config.ci.json

      - name: Save Virage cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            .virage/lancedb
            .virage/virage.db
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
