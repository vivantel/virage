name: Run Virage Pipeline

on:
  push:
    branches: [master]

jobs:
  virage-update:
    name: Virage Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Virage packages
        run: |
          npm install --prefix ./virage-runner \
            @vivantel/virage-cli@latest \
            @vivantel/virage-embedder-transformers@latest \
            @vivantel/virage-store-lancedb@latest

      - name: Restore Virage cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .virage/lancedb
            .virage/virage.db
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            virage-${{ github.ref_name }}-
            virage-

      - name: Run Virage pipeline
        run: ./virage-runner/node_modules/.bin/virage index --config virage.config.ci.json

      - name: Save Virage cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .virage/lancedb
            .virage/virage.db
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
