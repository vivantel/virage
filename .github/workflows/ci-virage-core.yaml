name: CI — @vivantel/virage-core

on:
  push:
    branches: [master, develop]
    paths:
      - 'packages/virage-core/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-virage-core.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/virage-core/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-virage-core.yaml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24, 26]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace packages/virage-core

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test --workspace packages/virage-core

      - name: Build
        run: npm run build --workspace packages/virage-core

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-virage-core-node-${{ matrix.node-version }}
          path: packages/virage-core/dist/
          retention-days: 7
