name: Virage Index Pipeline

on:
  push:
    branches: [master]
    paths:
      # Only re-index on content/config changes — code changes are handled by workflow_run
      # after publish completes (so index always uses the freshly-published binary).
      - 'docs/**'
      - 'virage.config.ci.json'
  workflow_dispatch:
  workflow_run:
    # re-index after binary publish — published binary may have improved algorithms
    workflows: ["Build & Publish Virage Binary"]
    types: [completed]

concurrency:
  group: virage-index-pipeline
  cancel-in-progress: false

jobs:
  index:
    name: Virage Index Pipeline
    runs-on: ubuntu-latest
    # skip if triggered by a failed publish
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install virage CLI
        run: npm install -g @vivantel/virage@latest

      - name: Restore Virage cache
        uses: actions/cache/restore@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            virage-${{ github.ref_name }}-
            virage-

      - name: Diagnose virage install
        env:
          RUST_BACKTRACE: "1"
        run: |
          npm list -g @vivantel/virage || true
          virage --no-banner validate --config virage.config.ci.json 2>&1 && echo "validate OK" || echo "validate FAILED"

      - name: Mask VirtIO GPU from ORT hardware probe
        # ORT 1.24.2 OrtCreateEnv() reads /sys/class/drm and crashes on VirtIO GPU (vendor 0x1af4)
        # with SEGV_MAPERR at 0x43 (NULL EP factory function pointer). Hide DRM to prevent this.
        run: sudo mount -t tmpfs none /sys/class/drm

      - name: Run Virage pipeline
        timeout-minutes: 5
        env:
          RUST_BACKTRACE: "1"
        run: virage -v index --config virage.config.ci.json 2>&1

      - name: Unmask GPU devices
        if: always()
        run: sudo umount /sys/class/drm || true

      - name: Save Virage cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
