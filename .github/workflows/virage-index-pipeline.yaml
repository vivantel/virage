name: Virage Index Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'packages/**/src/**'
      - 'crates/**'
      - 'virage.config.ci.json'
      - '.github/workflows/virage-index-pipeline.yaml'
  workflow_dispatch:
  workflow_run:
    # re-index after binary publish — published binary may have improved algorithms
    workflows: ["Build & Publish Virage Binary"]
    types: [completed]

concurrency:
  group: virage-index-pipeline
  cancel-in-progress: false

jobs:
  index:
    name: Virage Index Pipeline
    runs-on: ubuntu-latest
    # skip if triggered by a failed publish
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install virage CLI
        run: npm install -g @vivantel/virage@latest

      - name: Restore Virage cache
        uses: actions/cache/restore@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            virage-${{ github.ref_name }}-
            virage-

      - name: Run Virage pipeline
        timeout-minutes: 5
        run: virage --verbose index --config virage.config.ci.json

      - name: Save Virage cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
