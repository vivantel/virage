name: Virage Index Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'packages/**/src/**'
      - 'crates/**'
      - 'virage.config.ci.json'
      - '.github/workflows/virage-index-pipeline.yaml'
  workflow_dispatch:

concurrency:
  group: virage-index-pipeline
  cancel-in-progress: false

jobs:
  virage-update:
    name: Virage Index Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache virage binary
        id: bin-cache
        uses: actions/cache@v6
        with:
          path: target/release/virage
          key: ${{ runner.os }}-virage-bin-${{ hashFiles('crates/**', 'Cargo.lock', 'Cargo.toml') }}

      - name: Install Rust toolchain
        if: steps.bin-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        if: steps.bin-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-virage-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-virage-index-

      - name: Install protoc
        if: steps.bin-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Build virage binary
        if: steps.bin-cache.outputs.cache-hit != 'true'
        run: cargo build -p virage-engine --bin virage --release --features "cli,store-lancedb"

      - name: Restore Virage cache
        uses: actions/cache/restore@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            virage-${{ github.ref_name }}-
            virage-

      - name: Run Virage pipeline
        run: ./target/release/virage index --config virage.config.ci.json

      - name: Save Virage cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: virage-${{ github.ref_name }}-${{ github.sha }}
