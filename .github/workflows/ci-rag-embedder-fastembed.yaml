name: CI — @vivantel/rag-embedder-fastembed

on:
  push:
    branches: [master, develop]
    paths:
      - 'packages/rag-embedder-fastembed/**'
      - '.github/workflows/ci-rag-embedder-fastembed.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/rag-embedder-fastembed/**'
      - '.github/workflows/ci-rag-embedder-fastembed.yaml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24, 26]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        # --ignore-scripts skips onnxruntime-node GPU binary download; CPU-only works fine in CI
        run: npm ci --ignore-scripts

      - name: Type check
        run: npm run type-check --workspace packages/rag-embedder-fastembed

      - name: Run tests
        run: npm test --workspace packages/rag-embedder-fastembed

      - name: Build
        run: npm run build --workspace packages/rag-embedder-fastembed
