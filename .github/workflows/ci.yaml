name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
    paths:
      - 'packages/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yaml'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
      rust-changed: ${{ steps.rust-filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            virage-core:
              - 'packages/virage-core/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-embedder-openai:
              - 'packages/virage-embedder-openai/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-embedder-transformers:
              - 'packages/virage-embedder-transformers/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-embedder-fastembed:
              - 'packages/virage-embedder-fastembed/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-embedder-onnx:
              - 'packages/virage-embedder-onnx/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-store-postgres:
              - 'packages/virage-store-postgres/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-store-qdrant:
              - 'packages/virage-store-qdrant/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-store-lancedb:
              - 'packages/virage-store-lancedb/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-store-chromadb:
              - 'packages/virage-store-chromadb/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-skills:
              - 'packages/virage-skills/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-agent-claude:
              - 'packages/virage-agent-claude/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-cli:
              - 'packages/virage-cli/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-dashboard:
              - 'packages/virage-dashboard/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-mcp:
              - 'packages/virage-mcp/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-code-chunk-chunker:
              - 'packages/virage-code-chunk-chunker/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-agent-core:
              - 'packages/virage-agent-core/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-agent-copilot:
              - 'packages/virage-agent-copilot/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-agent-codex:
              - 'packages/virage-agent-codex/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-agent-antigravity:
              - 'packages/virage-agent-antigravity/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-git-isomorphic:
              - 'packages/virage-git-isomorphic/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-chunker-ce-ast:
              - 'packages/virage-chunker-ce-ast/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-chunker-ce-ts:
              - 'packages/virage-chunker-ce-ts/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-chunker-ce-pdf:
              - 'packages/virage-chunker-ce-pdf/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yaml'
            virage-chunker-ce-md:
              - 'packages/virage-chunker-ce-md/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yaml'
            virage-chunker-ce-docx:
              - 'packages/virage-chunker-ce-docx/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yaml'
            virage-chunker-ce-latex:
              - 'packages/virage-chunker-ce-latex/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yaml'
            virage-reranker-cross-encoder:
              - 'packages/virage-reranker-cross-encoder/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            virage-reranker-llm:
              - 'packages/virage-reranker-llm/**'
              - 'eslint.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'

      - uses: dorny/paths-filter@v4
        id: rust-filter
        with:
          filters: |
            changed:
              - 'packages/virage-chunker-ce-*/**'
              - 'packages/virage-embedder-onnx/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'

  rust-checks:
    name: Rust lint (CE native packages)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-changed == 'true' || github.event_name == 'pull_request'
    env:
      # mold: faster Linux linker; appends after config.toml's -fuse-ld=bfd (last flag wins) (IR-021)
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install mold linker
        # mold: faster Linux linker for CI builds (IR-021)
        run: sudo apt-get install -y mold

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-reg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-reg-

      - name: Restore compiled artifacts (IR-021)
        uses: actions/cache/restore@v6
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - run: npm ci --ignore-scripts

      - name: Rust formatting
        run: cargo fmt --check

      - name: Rust linting
        run: cargo clippy --workspace -- -D warnings

      - name: Check production feature sets
        run: |
          # Each entry: "package|flags"
          # Add a line here whenever a native package uses non-default production flags.
          checks=(
            "virage-embedder-onnx|--no-default-features --features download-binaries"
          )
          for entry in "${checks[@]}"; do
            pkg="${entry%%|*}"
            flags="${entry##*|}"
            echo "::group::cargo check -p $pkg $flags"
            cargo check -p "$pkg" $flags
            echo "::endgroup::"
          done

      - name: Test virage-engine
        run: cargo test -p virage-engine --features "pipeline,db-sqlite,wasm-host" --lib

      - name: Build CE native (linux-x64 validation)
        run: cargo build --release

      - name: Save compiled artifacts (master only, IR-021)
        uses: actions/cache/save@v6
        if: github.ref == 'refs/heads/master'
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

  coverage:
    name: Coverage (virage-engine)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust-changed == 'true' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-coverage-reg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-reg-

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - run: npm ci --ignore-scripts

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (virage-engine)
        run: |
          cargo llvm-cov \
            --package virage-engine \
            --features pipeline,db-sqlite,wasm-host \
            --lib \
            --no-report
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --html --output-dir coverage/

      - name: Upload LCOV to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build-and-test:
    needs: changes
    if: ${{ needs.changes.outputs.packages != '[]' && needs.changes.outputs.packages != '' }}
    name: CI — ${{ matrix.package }} / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
        package: ${{ fromJSON(needs.changes.outputs.packages) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild better-sqlite3
        if: contains(fromJSON('["virage-core", "virage-cli"]'), matrix.package)
        run: npm rebuild better-sqlite3

      - name: Build virage-core (required by dependents)
        if: matrix.package != 'virage-core'
        run: npm run build --workspace packages/virage-core

      - name: Build virage-agent-core (required by agent plugin packages and virage-cli)
        if: contains(fromJSON('["virage-cli", "virage-agent-claude", "virage-agent-copilot", "virage-agent-codex", "virage-agent-antigravity"]'), matrix.package)
        run: npm run build --workspace packages/virage-agent-core

      - name: Build virage-agent-claude (required by virage-cli)
        if: matrix.package == 'virage-cli'
        run: npm run build --workspace packages/virage-agent-claude

      - name: Build virage-chunker-ce-ast (required by CE native chunkers and virage-chunker-ce-ts)
        if: contains(fromJSON('["virage-chunker-ce-pdf","virage-chunker-ce-md","virage-chunker-ce-docx","virage-chunker-ce-latex","virage-chunker-ce-ts"]'), matrix.package)
        run: npm run build --workspace packages/virage-chunker-ce-ast

      - name: Type check
        run: npm run type-check --workspace packages/${{ matrix.package }}

      - name: Format check
        run: npm run format:check --workspace packages/${{ matrix.package }} --if-present

      - name: Lint
        run: npm run lint --workspace packages/${{ matrix.package }} --if-present

      - name: Run tests
        run: npm test --workspace packages/${{ matrix.package }}

      - name: Build
        run: npm run build --workspace packages/${{ matrix.package }}

      - name: Verify EXT_GROUPS packages are published on npm
        if: matrix.package == 'virage-cli'
        run: |
          node --input-type=module <<'EOF'
          import { EXT_GROUPS } from './packages/virage-cli/dist/cli/file-detect.js';
          import { spawnSync } from 'child_process';
          const pkgs = [...new Set(EXT_GROUPS.map(g => g.package))];
          let failed = false;
          for (const p of pkgs) {
            const r = spawnSync('npm', ['view', p, 'version'], { encoding: 'utf8' });
            if (r.status !== 0) { console.error('NOT PUBLISHED:', p); failed = true; }
            else console.log('ok:', p);
          }
          if (failed) process.exit(1);
          EOF
