name: CI — @vivantel/rag-core

on:
  push:
    branches: [master, develop]
    paths:
      - 'packages/rag-core/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/rag-core/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yaml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24, 26]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace packages/rag-core

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test --workspace packages/rag-core

      - name: Build
        run: npm run build --workspace packages/rag-core

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-rag-core-node-${{ matrix.node-version }}
          path: packages/rag-core/dist/
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Type coverage
        run: npx type-coverage --at-least 90 --project packages/rag-core/tsconfig.json

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run npm audit
        run: npm audit --json > npm-audit.json || true

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: npm-audit.json

  rag-update:
    name: RAG Pipeline
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace packages/rag-core

      - name: Restore RAG cache
        uses: actions/cache@v4
        with:
          path: docs/rag/
          key: rag-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            rag-${{ github.ref_name }}-
            rag-

      - name: Restore embedding progress
        uses: actions/cache/restore@v4
        with:
          path: docs/rag/embeddings.json
          key: rag-embeddings-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            rag-embeddings-${{ github.ref_name }}-

      - name: Run RAG pipeline
        run: ./node_modules/.bin/rag-update --config rag.config.ci.ts
        env:
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Save RAG cache
        uses: actions/cache/save@v4
        with:
          path: docs/rag/
          key: rag-${{ github.ref_name }}-${{ github.sha }}

      - name: Save embedding progress
        if: always()
        uses: actions/cache/save@v4
        with:
          path: docs/rag/embeddings.json
          key: rag-embeddings-${{ github.ref_name }}-${{ github.sha }}
