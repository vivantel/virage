name: Deploy Telemetry Proxy

on:
  push:
    branches:
      - master
    paths:
      - services/telemetry-proxy/**
      - infra/terraform/telemetry-proxy/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: services/telemetry-proxy/package-lock.json

      - name: Install proxy dependencies
        run: npm ci
        working-directory: services/telemetry-proxy

      - name: Build worker bundle
        run: npx wrangler build --outdir dist
        working-directory: services/telemetry-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_S3_BUCKET }}" \
            -backend-config="region=${{ vars.TF_STATE_S3_REGION }}"
        working-directory: infra/terraform/telemetry-proxy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_AWS_SECRET_ACCESS_KEY }}

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: infra/terraform/telemetry-proxy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_AWS_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_honeycomb_api_key: ${{ secrets.HONEYCOMB_API_KEY }}
