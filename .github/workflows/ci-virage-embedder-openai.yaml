name: CI — @vivantel/virage-embedder-openai

on:
  push:
    branches: [master, develop]
    paths:
      - 'packages/virage-embedder-openai/**'
      - 'packages/virage-core/**'
      - '.github/workflows/ci-virage-embedder-openai.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/virage-embedder-openai/**'
      - 'packages/virage-core/**'
      - '.github/workflows/ci-virage-embedder-openai.yaml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24, 26]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build rag-core
        run: npm run build --workspace packages/virage-core

      - name: Type check
        run: npm run type-check --workspace packages/virage-embedder-openai

      - name: Run tests
        run: npm test --workspace packages/virage-embedder-openai

      - name: Build
        run: npm run build --workspace packages/virage-embedder-openai
