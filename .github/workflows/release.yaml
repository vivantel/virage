name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write
  pages: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      virage-core: ${{ steps.release.outputs['packages/virage-core--release_created'] }}
      virage-strategies: ${{ steps.release.outputs['packages/virage-strategies--release_created'] }}
      virage-embedder-openai: ${{ steps.release.outputs['packages/virage-embedder-openai--release_created'] }}
      virage-embedder-transformers: ${{ steps.release.outputs['packages/virage-embedder-transformers--release_created'] }}
      virage-embedder-fastembed: ${{ steps.release.outputs['packages/virage-embedder-fastembed--release_created'] }}
      virage-store-postgres: ${{ steps.release.outputs['packages/virage-store-postgres--release_created'] }}
      virage-store-qdrant: ${{ steps.release.outputs['packages/virage-store-qdrant--release_created'] }}
      virage-store-lancedb: ${{ steps.release.outputs['packages/virage-store-lancedb--release_created'] }}
      virage-store-chromadb: ${{ steps.release.outputs['packages/virage-store-chromadb--release_created'] }}
      virage-skills: ${{ steps.release.outputs['packages/virage-skills--release_created'] }}
      virage-agent-claude: ${{ steps.release.outputs['packages/virage-agent-claude--release_created'] }}
      virage-cli: ${{ steps.release.outputs['packages/virage-cli--release_created'] }}
      virage-dashboard: ${{ steps.release.outputs['packages/virage-dashboard--release_created'] }}
      virage-mcp: ${{ steps.release.outputs['packages/virage-mcp--release_created'] }}
      virage-code-chunk-chunker: ${{ steps.release.outputs['packages/virage-code-chunk-chunker--release_created'] }}
      virage-agent-core: ${{ steps.release.outputs['packages/virage-agent-core--release_created'] }}
      virage-agent-copilot: ${{ steps.release.outputs['packages/virage-agent-copilot--release_created'] }}
      virage-agent-codex: ${{ steps.release.outputs['packages/virage-agent-codex--release_created'] }}
      virage-agent-antigravity: ${{ steps.release.outputs['packages/virage-agent-antigravity--release_created'] }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: .github/config/release-please.json
          manifest-file: .release-please-manifest.json


  compute-publish-matrix:
    needs: release-please
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - id: set
        run: |
          packages=()
          if [[ "${{ needs.release-please.outputs.virage-core }}" == "true" ]]; then packages+=("virage-core"); fi
          if [[ "${{ needs.release-please.outputs.virage-strategies }}" == "true" ]]; then packages+=("virage-strategies"); fi
          if [[ "${{ needs.release-please.outputs.virage-embedder-openai }}" == "true" ]]; then packages+=("virage-embedder-openai"); fi
          if [[ "${{ needs.release-please.outputs.virage-embedder-transformers }}" == "true" ]]; then packages+=("virage-embedder-transformers"); fi
          if [[ "${{ needs.release-please.outputs.virage-embedder-fastembed }}" == "true" ]]; then packages+=("virage-embedder-fastembed"); fi
          if [[ "${{ needs.release-please.outputs.virage-store-postgres }}" == "true" ]]; then packages+=("virage-store-postgres"); fi
          if [[ "${{ needs.release-please.outputs.virage-store-qdrant }}" == "true" ]]; then packages+=("virage-store-qdrant"); fi
          if [[ "${{ needs.release-please.outputs.virage-store-lancedb }}" == "true" ]]; then packages+=("virage-store-lancedb"); fi
          if [[ "${{ needs.release-please.outputs.virage-store-chromadb }}" == "true" ]]; then packages+=("virage-store-chromadb"); fi
          if [[ "${{ needs.release-please.outputs.virage-skills }}" == "true" ]]; then packages+=("virage-skills"); fi
          if [[ "${{ needs.release-please.outputs.virage-agent-claude }}" == "true" ]]; then packages+=("virage-agent-claude"); fi
          if [[ "${{ needs.release-please.outputs.virage-cli }}" == "true" ]]; then packages+=("virage-cli"); fi
          if [[ "${{ needs.release-please.outputs.virage-dashboard }}" == "true" ]]; then packages+=("virage-dashboard"); fi
          if [[ "${{ needs.release-please.outputs.virage-mcp }}" == "true" ]]; then packages+=("virage-mcp"); fi
          if [[ "${{ needs.release-please.outputs.virage-code-chunk-chunker }}" == "true" ]]; then packages+=("virage-code-chunk-chunker"); fi
          if [[ "${{ needs.release-please.outputs.virage-agent-core }}" == "true" ]]; then packages+=("virage-agent-core"); fi
          if [[ "${{ needs.release-please.outputs.virage-agent-copilot }}" == "true" ]]; then packages+=("virage-agent-copilot"); fi
          if [[ "${{ needs.release-please.outputs.virage-agent-codex }}" == "true" ]]; then packages+=("virage-agent-codex"); fi
          if [[ "${{ needs.release-please.outputs.virage-agent-antigravity }}" == "true" ]]; then packages+=("virage-agent-antigravity"); fi
          if [[ ${#packages[@]} -gt 0 ]]; then
            echo "packages=$(printf '%s\n' "${packages[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
          else
            echo "packages=[]" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish ${{ matrix.package }}
    needs: [release-please, compute-publish-matrix]
    if: ${{ needs.compute-publish-matrix.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.compute-publish-matrix.outputs.packages) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: "npm"

      - name: Sync lock file for workspace version bumps
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci ${{ contains('virage-embedder-transformers virage-embedder-fastembed virage-store-postgres virage-store-lancedb virage-store-chromadb', matrix.package) && '--ignore-scripts' || '' }}

      - name: Build virage-core (dependency)
        if: ${{ matrix.package != 'virage-core' && matrix.package != 'virage-dashboard' }}
        run: npm run build --workspace packages/virage-core

      - name: Build virage-agent-core (dependency for agent plugins and virage-cli)
        if: ${{ contains('virage-cli virage-agent-claude virage-agent-copilot virage-agent-codex virage-agent-antigravity', matrix.package) }}
        run: npm run build --workspace packages/virage-agent-core

      - name: Build virage-agent-claude (dependency for virage-cli)
        if: ${{ matrix.package == 'virage-cli' }}
        run: npm run build --workspace packages/virage-agent-claude

      - name: Build virage-dashboard (dependency)
        if: ${{ matrix.package == 'virage-cli' }}
        run: npm run build --workspace packages/virage-dashboard

      - name: Run tests
        run: npm test --workspace packages/${{ matrix.package }}

      - name: Build
        run: npm run build --workspace packages/${{ matrix.package }}

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}


  publish-github-packages:
    name: Publish @vivantel/virage-core to GitHub Packages
    needs: release-please
    if: ${{ needs.release-please.outputs['virage-core'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          cache: "npm"
      - run: npm ci
      - run: npm run build --workspace packages/virage-core
      - name: Publish to GitHub Packages
        run: npm publish
        working-directory: packages/virage-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy API Docs
    needs: release-please
    if: ${{ needs.release-please.outputs['virage-core'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: "npm"
      - run: npm ci
      - run: npm run build --workspace packages/virage-core
      - name: Generate API documentation
        run: npm run docs:generate --workspace packages/virage-core
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          keep_files: false
