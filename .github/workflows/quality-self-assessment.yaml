name: Quality Self-Assessment

on:
  workflow_dispatch:

jobs:
  quality:
    name: Pipeline Quality Assessment
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Build Virage packages from source
        run: |
          mkdir -p /tmp/virage-packs
          node scripts/patch-lockfile-stubs.cjs
          npm ci --ignore-scripts
          npm run build -w packages/virage-core
          npm run build -w packages/virage-cli
          npm pack --workspace packages/virage-core --pack-destination /tmp/virage-packs
          npm pack --workspace packages/virage-cli --pack-destination /tmp/virage-packs

      - name: Install Virage CLI + plugins
        run: |
          CORE_TGZ=$(ls /tmp/virage-packs/vivantel-virage-core-*.tgz)
          CLI_TGZ=$(ls /tmp/virage-packs/vivantel-virage-cli-*.tgz)
          npm install --prefix ./virage-runner \
            "$CORE_TGZ" \
            "$CLI_TGZ" \
            @vivantel/virage-embedder-transformers@latest \
            @vivantel/virage-store-lancedb@latest \
            @vivantel/virage-chunker-ce-md@latest \
            @vivantel/virage-code-chunk-chunker@latest

      - name: Restore Virage index cache
        uses: actions/cache/restore@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: quality-self-assessment-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            quality-self-assessment-${{ github.ref_name }}-
            quality-self-assessment-

      - name: Index knowledge base
        run: ./virage-runner/node_modules/.bin/virage index --config virage.config.ci.json

      - name: Save Virage index cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: |
            .virage/lancedb
            .virage/model-cache
          key: quality-self-assessment-${{ github.ref_name }}-${{ github.sha }}

      - name: Run quality self-assessment
        run: |
          mkdir -p .virage/quality-history
          ./virage-runner/node_modules/.bin/virage quality \
            --json \
            --history \
            --fail-fast \
            --benchmark-hf \
            --benchmark-hf-rows 50 \
            --output .virage/quality-report.json \
            --config virage.config.ci.json
        continue-on-error: true
        id: quality_run

      - name: Upload quality report artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: quality-report
          path: .virage/quality-report.json
          retention-days: 90

      - name: Write job summary
        if: always()
        run: |
          echo "## Pipeline Quality Self-Assessment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f .virage/quality-report.json ]; then
            ./virage-runner/node_modules/.bin/virage quality \
              --markdown \
              --config virage.config.ci.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || \
            echo "> Quality report generated — see artifact for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ Quality report not generated." >> $GITHUB_STEP_SUMMARY
          fi

      # benchmark-action/github-action-benchmark switches to gh-pages, which git
      # refuses if npm install modified virage-runner/package.json (a tracked file).
      - name: Restore tracked files before gh-pages switch
        if: always()
        run: git checkout -- virage-runner/ 2>/dev/null || true

      # ── Benchmark charts (benchmark-action/github-action-benchmark) ────────
      # Reads benchmark-data.json written by `virage quality --history`
      # Pushes results to gh-pages branch → generates charts at
      # https://vivantel.github.io/virage/dev/bench/
      - name: Store benchmark data
        uses: benchmark-action/github-action-benchmark@v1
        if: always() && hashFiles('.virage/quality-history/benchmark-data.json') != ''
        with:
          name: Virage Quality Metrics
          tool: customBiggerIsBetter
          output-file-path: .virage/quality-history/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: true
          alert-threshold: "85%"
          comment-on-alert: false
          fail-on-alert: false

      # ── Shields.io badge ──────────────────────────────────────────────────
      # Commits quality-badge.json to gh-pages so the README badge stays live.
      - name: Publish quality badge to gh-pages
        if: always() && hashFiles('.virage/quality-history/quality-badge.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BADGE_JSON=$(cat .virage/quality-history/quality-badge.json)

          # Switch to the latest gh-pages (benchmark-action may have pushed already)
          git fetch origin gh-pages
          git checkout gh-pages

          mkdir -p badges
          echo "$BADGE_JSON" > badges/quality.json

          git add badges/quality.json
          if git diff --cached --quiet; then
            echo "Badge unchanged — skipping commit."
          else
            git commit -m "chore(badges): update quality badge [skip ci]"
            git push origin gh-pages
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if quality gates did not pass
        if: steps.quality_run.outcome == 'failure'
        run: |
          echo "Quality self-assessment failed — see report above."
          exit 1
