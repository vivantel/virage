name: Build & Publish Virage Binary

on:
  push:
    tags:
      - 'virage-v2.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0)'
        required: true
        type: string
      platform:
        description: 'Single platform to build — leave blank for all (publish only runs on full builds)'
        required: false
        type: string

concurrency:
  group: virage-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build virage / ${{ matrix.platform-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        platform-name:
          - linux-x64-gnu
          - linux-arm64-gnu
          - darwin-arm64
          - win32-x64-msvc
        include:
          - { platform-name: linux-x64-gnu,   os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { platform-name: linux-arm64-gnu, os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, use-cross: true }
          - { platform-name: darwin-arm64,    os: macos-latest,   target: aarch64-apple-darwin }
          - { platform-name: win32-x64-msvc,  os: windows-latest, target: x86_64-pc-windows-msvc }

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-reg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-reg-

      - name: Cache build artifacts (linux-x64-gnu Docker build)
        # target/ cache for the manylinux2014 Docker build — sccache cannot run inside the container (IR-021)
        if: matrix.platform-name == 'linux-x64-gnu'
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-virage-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-virage-target-

      - name: Setup sccache (native platforms)
        # sccache: per-crate artifact cache, replaces target/ for non-Docker cargo builds (IR-021)
        if: matrix.platform-name != 'linux-x64-gnu'
        uses: mozilla-actions/sccache-action@v0.0.9

      # ── protoc (required by lance-encoding / prost-build) ─────────────────

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y
        shell: pwsh

      # ── linux-x64-gnu: manylinux2014 Docker → glibc 2.17 ─────────────────────

      - name: Cache Rust toolchain (manylinux2014 x64)
        if: matrix.platform-name == 'linux-x64-gnu' && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        uses: actions/cache@v6
        with:
          path: ~/.cargo-manylinux
          key: manylinux2014-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            manylinux2014-x64-cargo-

      - name: Cache ORT download (manylinux2014 x64)
        if: matrix.platform-name == 'linux-x64-gnu' && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        uses: actions/cache@v6
        with:
          path: ~/.cache/ort.pyke.io
          key: ort-manylinux-x64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ort-manylinux-x64-

      - name: Build (linux-x64-gnu — manylinux2014 glibc 2.17)
        if: matrix.platform-name == 'linux-x64-gnu' && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        run: |
          mkdir -p "$HOME/.cargo-manylinux" "$HOME/.cache/ort.pyke.io"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-manylinux:/cargo" \
            -v "$HOME/.cache/ort.pyke.io:/root/.cache/ort.pyke.io" \
            -e CARGO_HOME=/cargo \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -ec "
              source /opt/rh/devtoolset-10/enable

              # protoc — CentOS 7 EPEL is pre-3.12; install from GitHub (includes well-known protos)
              curl -sSfL "https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip" \
                -o /tmp/protoc.zip
              unzip -q /tmp/protoc.zip -d /usr/local
              chmod +x /usr/local/bin/protoc
              rm /tmp/protoc.zip

              # Rust toolchain — install once, cache across runs
              if [ ! -x /cargo/bin/rustup ]; then
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
                  sh -s -- -y --no-modify-path --default-toolchain stable
              fi
              export PATH=/cargo/bin:\$PATH
              # Always ensure stable is installed and default is set — partial cache hits
              # can leave rustup present but with no default configured
              rustup toolchain install stable --no-self-update
              rustup default stable
              rustup target add x86_64-unknown-linux-gnu

              cd /workspace
              cargo build -p virage-engine --bin virage --release \
                --target x86_64-unknown-linux-gnu \
                --features cli-binary,download-binaries,store-lancedb \
                --no-default-features
              cp target/x86_64-unknown-linux-gnu/release/virage /workspace/virage-linux-x64-gnu

              # Restore host file ownership so actions/cache can read new files
              HOST_GID=\$(stat -c '%u:%g' /workspace)
              chown -R \$HOST_GID /cargo /root/.cache/ort.pyke.io
              chown -R \$HOST_GID /workspace/target /workspace/virage-linux-x64-gnu
            "

      # ── linux-arm64-gnu: cross-compile ─────────────────────────────────────

      - name: Install cross-compilation toolchain (ARM64 Linux)
        if: matrix.use-cross == true && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build (linux-arm64-gnu)
        if: matrix.use-cross == true && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build -p virage-engine --bin virage --release \
            --target aarch64-unknown-linux-gnu \
            --features cli-binary,download-binaries,store-lancedb \
            --no-default-features
          cp target/aarch64-unknown-linux-gnu/release/virage virage-linux-arm64-gnu

      # ── darwin-arm64 ───────────────────────────────────────────────────────

      - name: Cache ORT download (macOS arm64)
        if: matrix.platform-name == 'darwin-arm64' && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/ort.pyke.io
          key: ort-macos-arm64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ort-macos-arm64-

      - name: Fix clang runtime path (macOS, for ORT link)
        if: matrix.platform-name == 'darwin-arm64' && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        run: |
          # ORT prebuilt binary requires clang_rt.osx; find its actual location on this runner
          rt=$(find /Applications/Xcode*.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang \
            -name "libclang_rt.osx*" 2>/dev/null | head -1)
          if [ -n "$rt" ]; then
            echo "LIBRARY_PATH=$(dirname "$rt")${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"
          fi

      - name: Build (darwin-arm64)
        if: matrix.platform-name == 'darwin-arm64' && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          cargo build -p virage-engine --bin virage --release \
            --target aarch64-apple-darwin \
            --features cli-binary,download-binaries,store-lancedb \
            --no-default-features
          cp target/aarch64-apple-darwin/release/virage virage-darwin-arm64

      # ── win32-x64-msvc ─────────────────────────────────────────────────────

      - name: Build (win32-x64-msvc)
        if: matrix.platform-name == 'win32-x64-msvc' && (inputs.platform == '' || inputs.platform == matrix.platform-name)
        run: |
          cargo build -p virage-engine --bin virage --release `
            --target x86_64-pc-windows-msvc `
            --features cli-binary,download-binaries,store-lancedb `
            --no-default-features
          Copy-Item target\x86_64-pc-windows-msvc\release\virage.exe virage-win32-x64-msvc.exe
        shell: pwsh

      # ── Upload ─────────────────────────────────────────────────────────────

      - uses: actions/upload-artifact@v7
        with:
          name: virage-${{ matrix.platform-name }}
          path: |
            virage-linux-x64-gnu
            virage-linux-arm64-gnu
            virage-darwin-arm64
            virage-win32-x64-msvc.exe
          if-no-files-found: ignore

  publish:
    name: Publish @vivantel/virage
    needs: build
    if: >-
      always() && needs.build.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.platform == '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - run: npm ci --omit=optional

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Place binaries into npm/ dirs
        run: |
          set -euo pipefail
          for platform in linux-x64-gnu linux-arm64-gnu darwin-arm64; do
            src="binaries/virage-${platform}/virage-${platform}"
            dst="packages/virage/npm/${platform}/virage"
            if [ ! -f "$src" ]; then
              echo "ERROR: missing binary for ${platform}: ${src}"
              exit 1
            fi
            cp "$src" "$dst"
            chmod +x "$dst"
          done
          src="binaries/virage-win32-x64-msvc/virage-win32-x64-msvc.exe"
          dst="packages/virage/npm/win32-x64-msvc/virage.exe"
          if [ ! -f "$src" ]; then
            echo "ERROR: missing binary for win32-x64-msvc"
            exit 1
          fi
          cp "$src" "$dst"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF#refs/tags/virage-v}"
            echo "version=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package versions
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const ver = process.env.VERSION;
            const mainPath = 'packages/virage/package.json';
            const main = JSON.parse(fs.readFileSync(mainPath, 'utf8'));
            main.version = ver;
            for (const k of Object.keys(main.optionalDependencies || {})) {
              main.optionalDependencies[k] = ver;
            }
            fs.writeFileSync(mainPath, JSON.stringify(main, null, 2) + '\n');
            for (const p of ['linux-x64-gnu','linux-arm64-gnu','darwin-arm64','win32-x64-msvc']) {
              const path = 'packages/virage/npm/' + p + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = ver;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            }
            console.log('bumped all packages to', ver);
          "

      - name: Publish platform stubs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          for platform in linux-x64-gnu linux-arm64-gnu darwin-arm64 win32-x64-msvc; do
            pkg_name="@vivantel/virage-${platform}"
            if npm view "${pkg_name}@${version}" version 2>/dev/null | grep -qF "${version}"; then
              echo "ℹ️  ${pkg_name}@${version} already on npm — skipping"
            else
              npm publish "packages/virage/npm/${platform}/" --access public
            fi
          done

      - name: Publish @vivantel/virage
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          if npm view "@vivantel/virage@${version}" version 2>/dev/null | grep -qF "${version}"; then
            echo "ℹ️  @vivantel/virage@${version} already on npm — skipping"
          else
            npm publish --workspace packages/virage --access public
          fi

      - name: Sync lockfile post-publish
        run: |
          # Restore package.json versions to source before syncing the lockfile.
          # "Bump package versions" wrote the publish version to these files, but
          # source in git still has the previous version.  Running npm install with
          # the bumped files commits a lockfile that references the new version,
          # while patch-lockfile-stubs.cjs (which reads source) patches it back on
          # every local push — permanently blocking git push.
          git checkout -- packages/virage/package.json packages/virage/npm/*/package.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -- package-lock.json 2>/dev/null || true
          git fetch origin master
          git checkout -B master origin/master

          for push_attempt in 1 2 3 4 5; do
            for resolve_attempt in 1 2 3; do
              npm install --package-lock-only --ignore-scripts --silent && break
              echo "Registry not yet consistent, waiting 30s (attempt $resolve_attempt)..."
              sleep 30
            done
            node scripts/patch-lockfile-stubs.cjs

            git diff --quiet package-lock.json && exit 0
            git add package-lock.json
            git commit -m "chore: sync package-lock.json [skip ci]"
            git push origin master && exit 0

            echo "Push attempt $push_attempt failed, re-syncing..."
            git reset HEAD~1
            git checkout -- package-lock.json
            git fetch origin master
            git rebase origin/master
          done
          exit 1
