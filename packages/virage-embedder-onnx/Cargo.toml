[package]
name    = "virage-embedder-onnx"
version = "0.1.0"
edition = "2021"
description = "ONNX Runtime embedder for Virage — run local embedding models entirely in Rust"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi        = { workspace = true }
napi-derive = { workspace = true }

# ort uses load-dynamic by default so `cargo test` links without a system ORT.
# Production CI builds pass --features download-binaries (see release.yaml)
# which fetches the ORT static library at build time → self-contained .node.
ort         = { version = "2.0.0-rc.12", features = ["load-dynamic"] }

# HuggingFace tokenizers — full Rust implementation, no subprocess
tokenizers  = { version = "0.21", default-features = false, features = ["onig"] }

[features]
# Activated during CI `napi build --features download-binaries`
download-binaries = ["ort/download-binaries"]

[build-dependencies]
napi-build = "2"
