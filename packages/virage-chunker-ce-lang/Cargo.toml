[package]
name    = "virage-chunker-ce-lang"
version = "0.1.0"
edition = "2021"
description = "Multi-language code chunker for Virage — tree-sitter CST → ViDoc AST"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi         = { workspace = true }
napi-derive  = { workspace = true }
serde_json   = { workspace = true }
virage-vidoc = { workspace = true }
tree-sitter  = "0.23"

# Language grammars — all must be ABI-compatible with tree-sitter 0.23
tree-sitter-python     = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-typescript = { version = "0.23", features = [] }
tree-sitter-java       = "0.23"
tree-sitter-go         = "0.23"
tree-sitter-rust       = "0.23"
tree-sitter-c          = "0.23"
tree-sitter-cpp        = "0.23"
tree-sitter-c-sharp    = "0.23"
tree-sitter-ruby       = "0.23"

[build-dependencies]
napi-build = "2"
